delete_unmanaged_custom_formats:
  enabled: false
media_management:
  id: 1
  autoUnmonitorPreviouslyDownloadedMovies: false
  recycleBinCleanupDays: 0
  downloadPropersAndRepacks: doNotPrefer
  createEmptyMovieFolders: false
  deleteEmptyFolders: true
  fileDate: "0"
  rescanAfterRefresh: afterManual
  autoRenameFolders: true
  pathsDefaultStatic: true
  setPermissionsLinux: false
  chmodFolder: ""
  chownGroup: ""
  skipFreeSpaceCheckWhenImporting: false
  minimumFreeSpaceWhenImporting: 100
  copyUsingHardlinks: true
  useScriptImport: false
  importExtraFiles: true
  extraFileExtensions: srt,sub,idx,vob
  enableMediaInfo: true
media_naming_api:
  id: 1
  renameMovies: true
  replaceIllegalCharacters: true
  colonReplacementFormat: delete
  standardMovieFormat: "{Movie CleanTitle} {(Release Year)} [imdbid-{ImdbId}] - {{Edition Tags}} {[MediaInfo 3D]}{[Custom Formats]}{[Quality Full]}{[Mediainfo AudioCodec}{ Mediainfo AudioChannels]}{[MediaInfo VideoDynamicRangeType]}{[Mediainfo VideoCodec]}{-Release Group}"
  movieFolderFormat: "{Movie CleanTitle} ({Release Year}) [tmdbid-{TmdbId}]"
quality_definition:
  type: movie # Quality definition type for Radarr
delete_old_custom_formats: true
replace_existing_custom_formats: true
